<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Store</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
}

/* Splash Screen */
#splash{
    position:fixed;
    width:100%;
    height:100vh;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999;
}

.logo{
    width:100px;
    height:100px;
    border-radius:50%;
    background:#00B050;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:35px;
    font-weight:bold;
}

.loading{
    margin-top:20px;
    font-size:18px;
    color:#555;
}

/* Main App */
.container{
    padding:20px;
}

.search-box{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.search-box input{
    flex:1;
    padding:14px;
    border:none;
    border-radius:30px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.tabs{
    display:flex;
    gap:15px;
    margin-bottom:20px;
    overflow-x:auto;
}

.tab{
    padding:10px 18px;
    background:white;
    border-radius:20px;
    cursor:pointer;
    font-weight:bold;
}

.active{
    background:#00B050;
    color:white;
}

.product{
    background:white;
    border-radius:15px;
    padding:15px;
    margin-bottom:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.product img{
    width:100%;
    border-radius:10px;
}

.product h3{
    margin-top:10px;
}

.creator{
    color:gray;
    margin:5px 0 15px;
}

.order-btn{
    display:inline-block;
    background:#25D366;
    color:white;
    padding:12px 20px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}
</style>
</head>
<body>

<div id="splash">
    <div class="logo">3D</div>
    <div class="loading">सर्च किया जा रहा है...</div>
</div>

<div class="container" id="app" style="display:none;">

    <div class="search-box">
        <input type="text" placeholder="Search models...">
    </div>

    <div class="tabs">
        <div class="tab active">For You</div>
        <div class="tab">Popular</div>
        <div class="tab">Trending</div>
        <div class="tab">New</div>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/400x250" alt="">
        <h3>Venus Valet Tray</h3>
        <p class="creator">By Marcolino3d</p>
        <a class="order-btn" href="https://wa.me/919060934512?text=Venus Valet Tray" target="_blank">
            ऑर्डर करें
        </a>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/400x250" alt="">
        <h3>Realistic Horse with Saddle</h3>
        <p class="creator">By Zazzatore</p>
        <a class="order-btn" href="https://wa.me/919060934512?text=Realistic Horse with Saddle" target="_blank">
            ऑर्डर करें
        </a>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/400x250" alt="">
        <h3>Majestic Wireframe Leaping Lion</h3>
        <p class="creator">By Kumawat007</p>
        <a class="order-btn" href="https://wa.me/919060934512?text=Majestic Wireframe Leaping Lion" target="_blank">
            ऑर्डर करें
        </a>
    </div>

</div>

<script>
setTimeout(() => {
    document.getElementById("splash").style.display = "none";
    document.getElementById("app").style.display = "block";
}, 3000);
</script>

</body>
</html><html>

</html>
